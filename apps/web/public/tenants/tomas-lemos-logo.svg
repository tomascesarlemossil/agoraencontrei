<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120" role="img" aria-label="Tomás Lemos Imóveis">
  <defs>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c8a86b"/>
      <stop offset="1" stop-color="#9a7b4f"/>
    </linearGradient>
  </defs>
  <rect width="420" height="120" fill="none"/>
  <!-- Monogram -->
  <g transform="translate(16,18)">
    <rect x="0" y="0" width="84" height="84" rx="14" fill="#1c1a17"/>
    <rect x="4" y="4" width="76" height="76" rx="11" fill="none" stroke="url(#brass)" stroke-width="1.5"/>
    <text x="42" y="56" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="600"
          fill="url(#brass)" text-anchor="middle">TL</text>
  </g>
  <!-- Wordmark -->
  <g transform="translate(120,0)">
    <text x="0" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="600"
          letter-spacing="0.5" fill="#1c1a17">Tomás Lemos</text>
    <text x="2" y="80" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="400"
          letter-spacing="6" fill="#9a7b4f">IMÓVEIS</text>
    <line x1="2" y1="92" x2="250" y2="92" stroke="#e7e1d6" stroke-width="1"/>
    <text x="2" y="108" font-family="Helvetica, Arial, sans-serif" font-size="11" letter-spacing="1.5"
          fill="#6b6457">CRECI 279051-F &#8226; Franca/SP</text>
  </g>
