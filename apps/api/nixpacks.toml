[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm install -g pnpm@10",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @agoraencontrei/database generate",
  "pnpm --filter @agoraencontrei/api build"
]

[start]
cmd = "node apps/api/dist/server.js"

[variables]
NODE_ENV = "production"
